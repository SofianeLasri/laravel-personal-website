name: laravel-personal-website

services:
  app:
    build:
      context: .
      dockerfile: production.Dockerfile
    restart: unless-stopped
    working_dir: /app
    volumes:
      - app-data:/app/storage
    depends_on:
      - mariadb
      - redis
    labels:
      - "traefik.http.services.app.loadbalancer.server.port=80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    mem_limit: 4g

  mariadb:
    image: mariadb:latest
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD}
      MARIADB_DATABASE: ${DB_DATABASE}
    volumes:
      - mariadb-data:/var/lib/mysql
    mem_limit: 1g

  redis:
    image: redis:alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data

  backup:
    build:
      context: .
      dockerfile: backup.Dockerfile
    restart: unless-stopped
    volumes:
      - backup-data:/app/backups
    depends_on:
      - app
    mem_limit: 512m

volumes:
  app-data:
  mariadb-data:
  redis-data:
  backup-data:
