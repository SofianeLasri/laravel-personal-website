name: laravel-personal-website-staging

services:
  app:
    build:
      context: .
      dockerfile: production.Dockerfile
    restart: unless-stopped
    working_dir: /app
    ports:
      - "${DOCKER_APP_PORT:-80}:8000"
    volumes:
      - app-data:/app/storage
    depends_on:
      - mariadb
      - redis
    networks:
      - app-network
    mem_limit: 4g

  mariadb:
    image: mariadb:latest
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD}
      MARIADB_DATABASE: ${DB_DATABASE}
    networks:
      - app-network
    volumes:
      - mariadb-data:/var/lib/mysql
    mem_limit: 1g

  redis:
    image: redis:alpine
    restart: unless-stopped
    networks:
      - app-network
    volumes:
      - redis-data:/data

networks:
  app-network:
    driver: bridge

volumes:
  app-data:
  mariadb-data:
  redis-data:
