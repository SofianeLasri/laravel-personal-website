name: laravel-personal-website

services:
  app:
    build:
      context: .
      dockerfile: production.Dockerfile
    restart: unless-stopped
    working_dir: /app
    volumes:
      - app-data:/app/storage
    depends_on:
      - redis
    labels:
      - "traefik.http.services.app.loadbalancer.server.port=80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    mem_limit: 4g

  backup:
    build:
      context: .
      dockerfile: backup.Dockerfile
    restart: unless-stopped
    volumes:
      - backup-data:/app/backups
    depends_on:
      - app
    mem_limit: 512m

volumes:
  app-data:
  mariadb-data:
  redis-data:
  backup-data:
